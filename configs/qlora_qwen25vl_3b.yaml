data:
  img_size: 224
  label_map: data/processed/label_map.json
  processed_dir: data/processed
  test_csv: data/processed/test.csv
  train_csv: data/processed/train.csv
  val_csv: data/processed/val.csv
lora:
  bias: none
  lora_alpha: 64
  lora_dropout: 0.05
  r: 32
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
  task_type: CAUSAL_LM
model:
  img_size: 224
  name: Qwen/Qwen2.5-VL-3B-Instruct
  num_classes: 18
  torch_dtype: bfloat16
paths:
  checkpoints: models/checkpoints
  figures: results/figures
  final_model: models/final/indagri_vlm_qwen25vl_3b
  logs: results/logs
  tables: results/tables
prompt:
  system: 'You are an expert agricultural scientist specialising in South Indian crop
    diseases. Diagnose the disease in the image and provide treatment recommendations
    in both English and Telugu.

    '
  user_template: 'Crop image attached. Weather context: {weather_context}. Crop growth
    stage: {growth_stage}. Question: What disease is present? Provide diagnosis and
    ICAR-recommended treatment in English and Telugu.

    '
qlora:
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  load_in_4bit: true
training:
  bf16: true
  dataloader_workers: 2
  eval_steps: 200
  fp16: false
  gradient_accumulation: 8
  gradient_checkpointing: true
  learning_rate: 0.0002
  load_best_model: true
  logging_steps: 50
  lr_scheduler: cosine
  max_grad_norm: 1.0
  metric_for_best: eval_accuracy
  num_epochs: 5
  output_dir: models/checkpoints/qlora_qwen25vl_3b
  per_device_batch: 1
  save_steps: 200
  seed: 42
  warmup_ratio: 0.05
  weight_decay: 0.01
